# Literary Fiction — Prose Pattern Preset
#
# Strict thresholds for dense, literary prose. Designed to catch AI writing
# fingerprints and common overuse patterns. 24 patterns across 4 categories.
#
# Density targets are per 1,000 words. Weight determines how much each
# pattern contributes to the severity score when over target.

patterns:
  # --- Core prose patterns ---

  - name: em_dash
    regex: "\u2014"
    target_density: 1.0
    weight: 3.0
    description: "Em-dashes — overuse creates choppy, self-conscious prose"

  - name: like_a_an
    regex: "\\blike\\s+(?:a|an)\\b"
    target_density: 0.6
    weight: 2.0
    description: "Simile constructions — keep the strongest, cut the rest"

  - name: as_if
    regex: "\\bas\\s+(?:if|though)\\b"
    target_density: 0.3
    weight: 1.5
    description: "As-if/as-though hedging — weakens immediacy"

  - name: the_way
    regex: "\\bthe\\s+way\\s+\\w+\\s+\\w+"
    target_density: 0.4
    weight: 1.5
    description: "The-way constructions — often signals telling over showing"

  - name: hedging_verbs
    regex: "\\b(?:seemed?\\s+to|appeared?\\s+to|as\\s+if\\s+(?:he|she|it|they)\\s+might)\\b"
    target_density: 0.15
    weight: 1.0
    description: "Hedging verbs — undercuts narrative authority"

  - name: sentence_start_and
    regex: "(?:^|\\n)\\s*And\\s+(?!so\\b)"
    target_density: 0.5
    weight: 0.5
    description: "Sentences starting with And — fine sparingly, grating in clusters"

  - name: sentence_start_but
    regex: "(?:^|\\n)\\s*But\\s+"
    target_density: 0.4
    weight: 0.5
    description: "Sentences starting with But — same concern as And-starts"

  # --- AI fingerprint patterns ---

  - name: filter_words
    regex: "\\bI\\s+(?:noticed|realized|felt|saw|heard|watched)\\b"
    target_density: 0.5
    weight: 1.5
    description: "Filter words — narrator inserting themselves between reader and action"

  - name: found_myself
    regex: "\\b(?:found\\s+(?:myself|himself|herself|themselves|itself))\\b"
    target_density: 0.15
    weight: 2.0
    description: "Found-myself construction — classic AI overuse pattern"

  - name: something_like
    regex: "\\b(?:something\\s+(?:like|between|close\\s+to))\\b"
    target_density: 0.15
    weight: 2.0
    description: "Something-like hedging — vague where precision serves better"

  - name: for_a_long_moment
    regex: "\\bfor\\s+a\\s+(?:long|brief)\\s+moment\\b"
    target_density: 0.1
    weight: 2.0
    description: "For-a-moment padding — usually cuttable"

  - name: or_perhaps
    regex: "\\b[Oo]r\\s+perhaps\\b"
    target_density: 0.1
    weight: 1.5
    description: "Or-perhaps equivocation — AI loves this construction"

  - name: passive_emotion
    regex: "\\bwas\\s+(?:filled|overcome|consumed|seized)\\s+(?:with|by)\\b"
    target_density: 0.15
    weight: 2.0
    description: "Passive emotion — telling emotion instead of showing it"

  - name: named_emotion_bare
    regex: "\\bfelt\\s+(?:anger|grief|fear|sadness|joy|rage|sorrow|love|despair|shame|guilt|relief|pity)\\b"
    target_density: 0.3
    weight: 1.5
    description: "Named emotion — show the feeling, don't label it"

  - name: emotional_softening
    regex: "\\bbut\\s+there\\s+was\\s+no\\s+malice\\b|\\bbut\\s+(?:he|she|they|I)\\s+meant\\s+no\\b|\\bthough\\s+(?:he|she|they|I)\\s+didn'?t\\s+mean\\b"
    target_density: 0.1
    weight: 2.5
    description: "Emotional softening — defusing tension the reader should feel"

  # --- Voice drift patterns ---

  - name: show_then_tell
    regex: "(?:In that (?:gesture|moment|silence|word|look|single)|That was (?:the|what)|That's what|That'?s the thing|Meaning:|What I mean is|The point (?:was|is)|In other words)"
    target_density: 0.1
    weight: 2.5
    description: "Show-then-tell — showing the moment, then explaining it"

  - name: the_kind_of
    regex: "\\bthe kind of \\w+ that\\b"
    target_density: 0.15
    weight: 1.5
    description: "The-kind-of-X-that — distancing construction"

  - name: the_particular
    regex: "\\bthe particular \\w+"
    target_density: 0.1
    weight: 1.5
    description: "The-particular — false precision, often cuttable"

  - name: not_x_y_fragment
    regex: "\\. Not [A-Za-z]+\\.\\s+(?:Not [A-Za-z]+\\.\\s+)*[A-Z]"
    target_density: 0.2
    weight: 1.0
    description: "Not-X fragment chains — dramatic but tiresome in repetition"

  - name: retrospective_foreshadow
    regex: "\\byears later\\b|\\bmonths later I would\\b|\\bonly later would I\\b|\\bI didn't know then\\b|\\b[Ii]n hindsight\\b|\\blooking back\\b|\\bgotten ahead of myself\\b"
    target_density: 0.1
    weight: 2.0
    description: "Retrospective foreshadowing — narrator stepping out of the moment"

  - name: something_vague
    regex: "\\b[Ss]omething (?:shifted|changed|stirred|broke|moved|passed between)\\b"
    target_density: 0.05
    weight: 2.0
    description: "Vague something — imprecise where specificity strengthens"

  # --- Precision patterns ---

  - name: not_x_not_y_but_z
    regex: "\\.\\s+Not [A-Za-z]+\\.\\s+Not [A-Za-z]+\\.\\s+But "
    target_density: 0.2
    weight: 1.5
    description: "Not-X, Not-Y, But-Z rhetorical pattern — once is enough"

  - name: something_complicated
    regex: "\\b[Ss]omething complicated\\b"
    target_density: 0.0
    weight: 3.0
    description: "Something complicated — never the right word choice"

  - name: silence_was_not
    regex: "\\b[Ss]ilence (?:was|were|seemed?) not (?:ordinary|normal|usual|natural|the kind)\\b"
    target_density: 0.03
    weight: 2.0
    description: "Silence-was-not — overused silence characterization"

  - name: triple_simile_stack
    regex: "(?:\\blike\\b[^.!?\\n]{0,80}\\blike\\b[^.!?\\n]{0,80}\\blike\\b)"
    target_density: 0.0
    weight: 3.0
    description: "Triple simile stack — three similes in one sentence"

  - name: might_have_been
    regex: "\\bmight have been\\b"
    target_density: 0.1
    weight: 1.0
    description: "Might-have-been — conditional past that weakens assertions"
